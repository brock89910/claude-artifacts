<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --gold: #d4a853;
  --gold-dim: #a07830;
  --gold-bg: #1a0f00;
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #161616;
  --bg4: #1e1e1e;
  --border: #252525;
  --border2: #333333;
  --text: #e8e4dc;
  --text2: #aaa;
  --text3: #666;
  --green: #4caf50;
  --blue: #5b9cf6;
  --red: #e05c5c;
  --orange: #f0a040;
  --purple: #a78bfa;
  --teal: #5bd4c8;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 20px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'DM Sans', sans-serif; color: var(--text); display: flex; flex-direction: column; }
.bebas { font-family: 'Bebas Neue', sans-serif; }
.mono { font-family: 'DM Mono', monospace; }

/* HEADER */
#hdr {
  flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 8px) 16px 12px;
  display: flex; justify-content: space-between; align-items: center;
  position: relative; z-index: 10;
}
#hdr-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); letter-spacing: 2px; }
#hdr-right { display: flex; align-items: center; gap: 10px; }
#streak-badge {
  font-family: 'DM Mono', monospace; font-size: 12px;
  color: var(--gold); background: var(--gold-bg);
  border: 1px solid var(--gold-dim); padding: 4px 10px; border-radius: 20px;
}
#date-badge {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--text3); background: var(--bg3);
  border: 1px solid var(--border); padding: 4px 9px; border-radius: 20px;
}

/* MAIN SCROLL */
#main { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }

/* BOTTOM TABS */
#tabs {
  flex-shrink: 0; background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex; padding-bottom: var(--safe-bot);
  position: relative; z-index: 10;
}
.tab {
  flex: 1; background: none; border: none; color: var(--text3);
  font-size: 9px; font-family: 'DM Sans', sans-serif; font-weight: 500;
  padding: 10px 2px 8px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: color 0.2s; letter-spacing: 0.5px; text-transform: uppercase;
}
.tab .ti { font-size: 19px; line-height: 1; }
.tab.on { color: var(--gold); }

/* PAGES */
.pg { display: none; padding-bottom: 20px; min-height: 100%; }
.pg.on { display: block; }

/* SECTION LABELS */
.sec-lbl {
  font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 3px;
  color: var(--text3); padding: 16px 16px 8px; text-transform: uppercase;
}

/* CALENDAR STRIP */
.cal-strip {
  display: flex; overflow-x: auto; gap: 6px; padding: 8px 16px 12px;
  scrollbar-width: none;
}
.cal-strip::-webkit-scrollbar { display: none; }
.cal-day {
  flex-shrink: 0; width: 44px; height: 54px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
  cursor: pointer; gap: 2px; transition: all 0.15s;
}
.cal-day .cd-dow { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
.cal-day .cd-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--text2); line-height: 1; }
.cal-day.on { background: var(--gold-bg); border-color: var(--gold-dim); }
.cal-day.on .cd-num { color: var(--gold); }
.cal-day.on .cd-dow { color: var(--gold-dim); }
.cal-day.today .cd-num { color: var(--text); }

/* ============ MANDALA PAGE ============ */
.mandala-wrap { padding: 0 12px 16px; overflow-x: auto; }
.mandala-grid {
  display: grid; grid-template-columns: repeat(9, 1fr);
  gap: 3px; min-width: 320px;
}
.mc {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  text-align: center; font-size: 8px; line-height: 1.2; font-weight: 500;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 5px;
  cursor: pointer; padding: 3px; position: relative; transition: all 0.15s;
  color: var(--text2); user-select: none;
}
.mc:active { transform: scale(0.94); }
.mc.center {
  background: linear-gradient(135deg, #2a1800, #1a0f00);
  border: 2px solid var(--gold);
  font-family: 'Bebas Neue', sans-serif; font-size: 10px;
  color: var(--gold); letter-spacing: 0.5px;
}
.mc.cat-label {
  background: var(--bg4); border-color: var(--border2);
  font-family: 'Bebas Neue', sans-serif; font-size: 9px;
  color: var(--text); letter-spacing: 0.5px;
}
.mc.complete { background: #0d2010; border-color: #2a5a2a; color: var(--green); }
.mc.partial { background: #1a1200; border-color: #4a3800; color: var(--orange); }
.mc.missed { background: #200a0a; border-color: #5a2020; color: var(--red); }
.mc.complete::after { content: "✓"; position: absolute; top: 2px; right: 3px; font-size: 7px; color: var(--green); }
.mc.partial::after { content: "⚡"; position: absolute; top: 2px; right: 3px; font-size: 6px; color: var(--orange); }
.mc.missed::after { content: "✕"; position: absolute; top: 2px; right: 3px; font-size: 7px; color: var(--red); }

.cat-progress-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 12px 8px; }
.cat-card {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 12px;
}
.cat-card-name { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; }
.cat-card-bar { height: 3px; background: var(--border2); border-radius: 2px; margin-bottom: 4px; }
.cat-card-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s; }
.cat-card-pct { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--gold); }

/* BOTTOM SHEET MODAL */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 100; display: none; backdrop-filter: blur(4px);
}
#modal-overlay.on { display: flex; align-items: flex-end; }
#modal-sheet {
  background: var(--bg2); border-top: 1px solid var(--border2);
  border-radius: 20px 20px 0 0; width: 100%; padding: 12px 20px calc(var(--safe-bot) + 20px);
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text); letter-spacing: 1px; margin-bottom: 4px; }
.modal-cat { font-size: 11px; color: var(--text3); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
.modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mbtn {
  padding: 14px; border: 1px solid var(--border2); border-radius: 12px;
  background: var(--bg3); color: var(--text2); font-size: 13px; font-weight: 600;
  cursor: pointer; text-align: center; transition: all 0.15s;
}
.mbtn:active { transform: scale(0.96); }
.mbtn.complete-btn { border-color: var(--green); color: var(--green); }
.mbtn.partial-btn { border-color: var(--orange); color: var(--orange); }
.mbtn.missed-btn { border-color: var(--red); color: var(--red); }
.mbtn.clear-btn { border-color: var(--border2); color: var(--text3); }

/* ============ TASKS PAGE ============ */
.filter-row { display: flex; gap: 6px; padding: 0 16px 10px; overflow-x: auto; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.fchip {
  flex-shrink: 0; padding: 5px 12px; border-radius: 20px;
  background: var(--bg3); border: 1px solid var(--border); color: var(--text3);
  font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap;
  transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.5px;
}
.fchip.on { background: var(--gold-bg); border-color: var(--gold-dim); color: var(--gold); }

.task-item {
  display: flex; align-items: flex-start; gap: 12px;
  margin: 0 12px 6px; padding: 12px 13px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
  transition: opacity 0.2s;
}
.task-item.done-item { opacity: 0.45; }
.task-status-btn {
  width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border2);
  flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; transition: all 0.15s; background: none;
}
.task-body { flex: 1; min-width: 0; }
.task-name { font-size: 14px; font-weight: 500; line-height: 1.4; }
.task-name.done { text-decoration: line-through; color: var(--text3); }
.task-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
.type-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.task-type-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.task-time { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }
.task-due { font-size: 10px; color: var(--orange); font-family: 'DM Mono', monospace; }
.task-del { background: none; border: none; color: var(--border2); font-size: 18px; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
.task-del:active { color: var(--red); }
.s-notstarted { border-color: var(--border2); color: transparent; }
.s-inprogress { border-color: var(--blue); background: rgba(91,156,246,0.15); color: var(--blue); }
.s-done { border-color: var(--green); background: var(--green); color: #fff; }
.s-next { border-color: var(--purple); background: rgba(167,139,250,0.15); color: var(--purple); }
.s-skipped { border-color: var(--text3); background: rgba(100,100,100,0.15); color: var(--text3); }

.add-task-row { display: flex; gap: 8px; margin: 0 12px 8px; }
.add-task-input {
  flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 10px 13px; outline: none;
}
.add-task-input:focus { border-color: var(--gold-dim); }
.add-task-input::placeholder { color: var(--text3); }
.add-task-btn {
  background: var(--gold); border: none; border-radius: 10px;
  color: #000; font-size: 22px; font-weight: 700; width: 44px; cursor: pointer;
}
.type-select {
  display: block; width: calc(100% - 24px); margin: 0 12px 10px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text2); font-size: 13px; padding: 9px 12px; outline: none;
}

/* ============ FITNESS PAGE ============ */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 12px 10px; }
.stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.stat-label { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
.stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--gold); line-height: 1; }
.stat-unit { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); }

.weight-input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 12px 10px; }
.w-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
.w-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
.w-input-row { display: flex; align-items: center; gap: 6px; }
.w-input {
  flex: 1; background: var(--bg4); border: 1px solid var(--border2); border-radius: 8px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 18px;
  padding: 8px; outline: none; width: 100%; text-align: center;
}
.w-input:focus { border-color: var(--gold-dim); }
.w-unit { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.log-btn {
  display: block; width: calc(100% - 24px); margin: 0 12px 14px;
  background: var(--gold); border: none; border-radius: 10px;
  color: #000; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px;
  padding: 13px; cursor: pointer; transition: opacity 0.15s;
}
.log-btn:active { opacity: 0.8; }

/* Chart cards — fixed height + proper canvas sizing */
.chart-card {
  margin: 0 12px 12px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 14px 10px;
}
.chart-title {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--text3);
  text-transform: uppercase; margin-bottom: 8px;
}
.chart-title span { color: var(--text2); font-weight: 400; letter-spacing: 0; }
.range-row { display: flex; gap: 6px; margin-bottom: 10px; }
.rbtn {
  padding: 4px 10px; border-radius: 8px; background: var(--bg4); border: 1px solid var(--border);
  color: var(--text3); font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'DM Mono', monospace;
  transition: all 0.15s;
}
.rbtn.on { background: var(--gold-bg); border-color: var(--gold-dim); color: var(--gold); }
.chart-wrap { position: relative; width: 100%; height: 160px; }
.chart-wrap-sm { position: relative; width: 100%; height: 100px; }

.history-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
.history-row:last-child { border-bottom: none; }
.history-date { color: var(--text2); font-family: 'DM Mono', monospace; }
.history-vals { color: var(--text3); font-family: 'DM Mono', monospace; font-size: 11px; }

/* ============ CALORIE LOGGER ============ */
.cal-target-row {
  display: flex; align-items: center; gap: 8px; margin: 0 12px 10px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 12px;
}
.cal-target-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; flex: 1; }
.cal-target-input {
  background: var(--bg4); border: 1px solid var(--border2); border-radius: 8px;
  color: var(--gold); font-family: 'DM Mono', monospace; font-size: 16px;
  padding: 6px 10px; outline: none; width: 90px; text-align: center;
}
.cal-target-input:focus { border-color: var(--gold-dim); }
.cal-target-unit { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

.cal-ring-row {
  display: flex; align-items: center; gap: 14px;
  margin: 0 12px 10px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px;
}
.cal-ring-wrap { position: relative; flex-shrink: 0; width: 90px; height: 90px; }
.cal-ring-wrap svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.cal-ring-bg { fill: none; stroke: var(--border2); stroke-width: 8; }
.cal-ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
.cal-ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.cal-ring-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); line-height: 1; }
.cal-ring-sub { font-size: 9px; color: var(--text3); letter-spacing: 1px; }
.cal-ring-stats { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.cal-ring-stat { display: flex; justify-content: space-between; align-items: center; }
.cal-ring-stat-lbl { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.cal-ring-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text); }
.cal-ring-stat-val.over { color: var(--red); }
.cal-ring-stat-val.good { color: var(--green); }

.macro-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 0 12px 10px; }
.macro-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; text-align: center; }
.macro-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
.macro-bar { height: 3px; background: var(--border2); border-radius: 2px; margin: 4px 0; overflow: hidden; }
.macro-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
.macro-val { font-family: 'Bebas Neue', sans-serif; font-size: 18px; line-height: 1; }
.macro-goal { font-size: 9px; color: var(--text3); font-family: 'DM Mono', monospace; }

.add-food-section { margin: 0 12px 10px; }
.add-food-row { display: flex; gap: 8px; margin-bottom: 8px; }
.food-input {
  flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 10px 13px; outline: none;
}
.food-input:focus { border-color: var(--gold-dim); }
.food-input::placeholder { color: var(--text3); }
.food-num-input {
  width: 72px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px;
  padding: 10px 8px; outline: none; text-align: center;
}
.food-num-input:focus { border-color: var(--gold-dim); }
.food-add-btn {
  background: var(--gold); border: none; border-radius: 10px;
  color: #000; font-size: 20px; font-weight: 700; width: 44px; cursor: pointer; flex-shrink: 0;
}
.macro-inputs-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.macro-mini-wrap { position: relative; }
.macro-mini-lbl { position: absolute; top: 7px; left: 10px; font-size: 9px; color: var(--text3); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; pointer-events: none; }
.macro-mini-input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px;
  padding: 22px 8px 8px; outline: none; text-align: center;
}
.macro-mini-input:focus { border-color: var(--gold-dim); }
.meal-type-row { display: flex; gap: 6px; margin-bottom: 8px; overflow-x: auto; scrollbar-width: none; }
.meal-type-row::-webkit-scrollbar { display: none; }
.meal-chip {
  flex-shrink: 0; padding: 5px 12px; border-radius: 20px;
  background: var(--bg3); border: 1px solid var(--border); color: var(--text3);
  font-size: 11px; font-weight: 600; cursor: pointer;
  transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.5px;
}
.meal-chip.on { background: var(--gold-bg); border-color: var(--gold-dim); color: var(--gold); }

.food-list { margin: 0 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.food-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-bottom: 1px solid var(--border);
}
.food-row:last-child { border-bottom: none; }
.food-meal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.food-row-body { flex: 1; min-width: 0; }
.food-row-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.food-row-macros { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 1px; }
.food-row-cal { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text2); flex-shrink: 0; }
.food-del { background: none; border: none; color: var(--border2); font-size: 18px; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
.food-del:active { color: var(--red); }

/* ============ READINGS PAGE ============ */
.overall-progress { margin: 0 12px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
.op-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.op-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; }
.op-pct { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold); }
.op-bar { height: 4px; background: var(--border2); border-radius: 2px; }
.op-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.5s; }
.course-card { margin: 0 12px 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.course-hdr { display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; cursor: pointer; user-select: none; background: none; border: none; width: 100%; color: inherit; text-align: left; }
.course-name { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--text); letter-spacing: 1px; }
.course-badge { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--bg4); border: 1px solid var(--border2); color: var(--text3); padding: 3px 9px; border-radius: 20px; }
.course-card.open .course-badge { border-color: var(--gold-dim); color: var(--gold); }

.reading-row:active { background: var(--bg4); }
.rcheck { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border2); flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; }
.rcheck.on { background: var(--blue); border-color: var(--blue); }
.rcheck.on::after { content: "✓"; color: #fff; font-size: 10px; font-weight: 700; }
.reading-title { font-size: 13px; line-height: 1.4; flex: 1; }
.reading-title.done { color: var(--text3); text-decoration: line-through; }
.reading-author { font-size: 11px; color: var(--text3); }

/* TOAST */
#toast {
  position: fixed; bottom: calc(var(--safe-bot) + 70px); left: 50%;
  transform: translateX(-50%); background: var(--bg4); border: 1px solid var(--border2);
  border-radius: 20px; padding: 8px 18px; font-size: 12px; color: var(--text);
  opacity: 0; pointer-events: none; white-space: nowrap; z-index: 200;
  transition: opacity 0.2s; font-weight: 500;
}
#toast.on { opacity: 1; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }

// ===================== STORAGE =====================
function G(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function S(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function today(){return new Date().toISOString().split("T")[0];}
function shiftDate(s,n){var d=new Date(s+"T12:00:00");d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function fmtDate(s){return new Date(s+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}
function fmtShort(s){var d=new Date(s+"T12:00:00");return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

var toastTimer=null;
function toast(m){
  var el=document.getElementById("toast");
  el.textContent=m; el.classList.add("on");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.classList.remove("on");},1800);
}

function updateHeader(){
  var d=new Date();
  document.getElementById("date-badge").textContent=d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  var n=0,dt=today();
  for(var i=0;i<365;i++){
    var h=G("m_"+dt)||{},found=false;
    for(var k in h){if(h[k]&&h[k]!==''){found=true;break;}}
    if(found){n++;dt=shiftDate(dt,-1);}else break;
  }
  document.getElementById("streak-badge").textContent="🔥 "+n;
}

  if(t==="checklist")renderChecklist();

});

// ===================== CALENDAR STRIP =====================
function buildCalStrip(containerId,selectedDate,onSelect){
  var container=document.getElementById(containerId);
  var html='';
  var td=today();
  for(var i=-6;i<=0;i++){
    var d=shiftDate(td,i);
    var dt=new Date(d+"T12:00:00");
    var dow=dt.toLocaleDateString("en-US",{weekday:"short"}).toUpperCase();
    var num=dt.getDate();
    var cls="cal-day"+(d===selectedDate?" on":"")+(d===td?" today":"");
    html+='<div class="'+cls+'" data-d="'+d+'"><span class="cd-dow">'+dow+'</span><span class="cd-num">'+num+'</span></div>';
  }
  container.innerHTML='<div class="cal-strip">'+html+'</div>';
  container.querySelectorAll(".cal-day").forEach(function(el){
    el.addEventListener("click",function(){onSelect(el.dataset.d);});
  });
}

function renderMandala(){
  buildCalStrip("cal-mandala",mandalaDate,function(d){mandalaDate=d;renderMandala();});
  var H=G("m_"+mandalaDate)||{};
  var grid=document.getElementById("mandala-grid");
  var catMap={};
  CATS.forEach(function(c){catMap[c.id]=c;});
  var html='';
  for(var r=0;r<9;r++){
    for(var c=0;c<9;c++){
      var cell=MANDALA_LAYOUT[r][c];
      if(!cell){html+='<div class="mc" style="background:transparent;border-color:transparent;cursor:default;"></div>';continue;}
      if(cell.type==='center'){html+='<div class="mc center">JOURNAL</div>';continue;}
      if(cell.type==='cat'){var cn=catMap[cell.catId].name;html+='<div class="mc cat-label">'+esc(cn)+'</div>';continue;}
      var cat=catMap[cell.catId];
      var itemTxt=cat.items[cell.itemIdx]||"";
      var key=cell.catId+"_"+cell.itemIdx;
      var st=H[key]||"";
      var stCls=st==="complete"?" complete":st==="partial"?" partial":st==="missed"?" missed":"";
      html+='<div class="mc'+stCls+'" data-key="'+key+'" data-cat="'+cell.catId+'" data-item="'+cell.itemIdx+'" data-txt="'+esc(itemTxt)+'">'+esc(itemTxt)+'</div>';
    }
  }
  grid.innerHTML=html;
  grid.querySelectorAll(".mc[data-key]").forEach(function(el){
    el.addEventListener("click",function(){openModal(el);});
  });
  renderCatProgress(H);
  updateHeader();
}

function renderCatProgress(H){
  var html='';
  CATS.forEach(function(cat){
    var total=cat.items.length,done=0;
    cat.items.forEach(function(item,i){if(H[cat.id+"_"+i]==="complete")done++;});

// Day-of-week name from YYYY-MM-DD
function getDOW(dateStr){
  var d=new Date(dateStr+"T12:00:00");
  return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
}

// Check-in logic: every 3 days from epoch, alternate fitness vs learning check-ins
function getCheckinType(dateStr){
  var epoch=new Date("2024-01-01T00:00:00");
  var d=new Date(dateStr+"T12:00:00");
  var days=Math.floor((d-epoch)/(1000*60*60*24));
  if(days%3!==0)return null;
  // Alternate: even cycles = fitness, odd cycles = learning
  var cycle=Math.floor(days/3);
  return cycle%2===0?"fitness":"learning";
}

function renderFitnessStats(){

  var latest=sorted[0];
  var prev=sorted[1];
  var cur=latest?(latest.am||latest.pm||"—"):"—";
  var chg="—";
  if(latest&&prev){
    var a=latest.am||latest.pm,b=prev.am||prev.pm;
    if(a&&b){var diff=(parseFloat(a)-parseFloat(b)).toFixed(1);chg=(diff>0?"+":"")+diff;}

  var days=log.length;
  document.getElementById("fit-stats").innerHTML=
    '<div class="stat-card"><div class="stat-label">Current</div><div class="stat-value">'+cur+'</div><div class="stat-unit">kg</div></div>'
   +'<div class="stat-card"><div class="stat-label">Change</div><div class="stat-value" style="color:'+(chg.startsWith("-")?"var(--green)":"var(--red)")+'">'+chg+'</div><div class="stat-unit">kg</div></div>'
   +'<div class="stat-card"><div class="stat-label">Logged</div><div class="stat-value">'+days+'</div><div class="stat-unit">days</div></div>';

// Fixed chart builder — uses wrapper div for sizing, destroys old instances properly
function buildCharts(){
  var log=(G("fitness")||[]).slice().sort(function(a,b){return a.dt<b.dt?-1:1;});
  var n=chartRange==="7D"?7:chartRange==="14D"?14:chartRange==="30D"?30:log.length;
  var data=log.slice(-n);

  var labels=data.map(function(e){return fmtShort(e.dt);});
  var amVals=data.map(function(e){return e.am?parseFloat(e.am):null;});
  var pmVals=data.map(function(e){return e.pm?parseFloat(e.pm):null;});
  var diffVals=data.map(function(e){
    if(e.pm&&e.am)return parseFloat((parseFloat(e.pm)-parseFloat(e.am)).toFixed(2));
    return null;
  });

  // Graceful no-data state
  if(!data.length){
    var ww=document.querySelector(".chart-wrap");
    if(ww)ww.innerHTML='<canvas id="wt-chart"></canvas><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;">Log weight to see chart</div>';
    var ws=document.querySelector(".chart-wrap-sm");
    if(ws)ws.innerHTML='<canvas id="diff-chart"></canvas>';
    return;
  }

  // Auto y-axis: tight range around data
  var allWt=amVals.concat(pmVals).filter(function(v){return v!==null;});
  var yMin=allWt.length?Math.floor(Math.min.apply(null,allWt)-1):0;
  var yMax=allWt.length?Math.ceil(Math.max.apply(null,allWt)+1):100;

  var gridColor="rgba(255,255,255,0.04)";
  var tickFont={family:"'DM Mono', monospace",size:9};
  var tickColor="#444";

  var baseOpts={
    responsive:true,
    maintainAspectRatio:false,
    animation:{duration:400},
    plugins:{
      legend:{display:true,labels:{color:"#777",font:{family:"'DM Mono', monospace",size:10},boxWidth:10,padding:12}},
      tooltip:{
        backgroundColor:"#1a1a1a",borderColor:"#333",borderWidth:1,
        titleColor:"#d4a853",bodyColor:"#aaa",
        padding:10,cornerRadius:8
      }
    },
    scales:{
      x:{ticks:{color:tickColor,font:tickFont,maxRotation:0},grid:{color:gridColor},border:{color:"transparent"}},
      y:{ticks:{color:tickColor,font:tickFont},grid:{color:gridColor},border:{color:"transparent"},min:yMin,max:yMax}
    }
  };

  // Destroy old charts safely
  if(wtChart){try{wtChart.destroy();}catch(e){}wtChart=null;}
  if(diffChart){try{diffChart.destroy();}catch(e){}diffChart=null;}

  // Re-create canvases inside wrapper to reset state
  var wrapWT=document.querySelector(".chart-wrap");
  wrapWT.innerHTML='<canvas id="wt-chart"></canvas>';
  var ctx1=document.getElementById("wt-chart").getContext("2d");

// ===================== CALORIE LOGGER =====================
var MEAL_TYPES=["Breakfast","Lunch","Dinner","Snack","Pre-workout","Post-workout"];
var MEAL_COLORS={"Breakfast":"#f0a040","Lunch":"#5b9cf6","Dinner":"#a78bfa","Snack":"#5bd4c8","Pre-workout":"#d4a853","Post-workout":"#4caf50"};
var activeMeal="Breakfast";

// Macro goals (% of target calories)
var MACRO_RATIOS={p:0.30,c:0.45,f:0.25}; // protein 30%, carbs 45%, fat 25%

function buildMealTypeRow(){
  var html='';
  MEAL_TYPES.forEach(function(m){
    html+='<div class="meal-chip'+(activeMeal===m?" on":"")+'" data-m="'+m+'">'+m+'</div>';
  });
  document.getElementById("meal-type-row").innerHTML=html;
  document.querySelectorAll(".meal-chip").forEach(function(c){
    c.addEventListener("click",function(){activeMeal=c.dataset.m;buildMealTypeRow();});
  });
}
function renderMealTypeRow(){buildMealTypeRow();}

function getCalData(){return G("cal_"+fitDate)||[];}
function saveCalData(arr){S("cal_"+fitDate,arr);}

function renderCalorieUI(){
  var entries=getCalData();
  var target=parseInt(G("cal_target"))||0;
  var totalCal=entries.reduce(function(s,e){return s+(e.cal||0);},0);
  var totalP=entries.reduce(function(s,e){return s+(e.p||0);},0);
  var totalC=entries.reduce(function(s,e){return s+(e.c||0);},0);
  var totalF=entries.reduce(function(s,e){return s+(e.f||0);},0);

  // Ring
  var pct=target>0?Math.min(totalCal/target,1):0;
  var circumference=226.2;
  var offset=circumference-(pct*circumference);
  var arc=document.getElementById("cal-ring-arc");
  if(arc){
    arc.style.strokeDashoffset=offset;
    arc.style.stroke=pct>=1?"var(--red)":"var(--gold)";
  }
  var numEl=document.getElementById("cal-total-num");
  if(numEl)numEl.textContent=totalCal;

  var remainEl=document.getElementById("cal-ring-remain");
  var targetEl=document.getElementById("cal-ring-target");
  if(targetEl)targetEl.textContent=target?target+'kcal':'—';
  if(remainEl){
    var rem=target-totalCal;
    remainEl.textContent=target?(rem>=0?rem+'kcal':'+'+Math.abs(rem)+'kcal'):'—';
    remainEl.className="cal-ring-stat-val "+(rem<0?"over":(rem<200?"good":""));
  }
  var entriesEl=document.getElementById("cal-ring-entries");
  if(entriesEl)entriesEl.textContent=entries.length;

  // Macros
  var pGoal=target?Math.round(target*MACRO_RATIOS.p/4):0; // kcal/4 = grams protein
  var cGoal=target?Math.round(target*MACRO_RATIOS.c/4):0;
  var fGoal=target?Math.round(target*MACRO_RATIOS.f/9):0; // kcal/9 = grams fat

  function setPct(barId,pct){
    var el=document.getElementById(barId);
    if(el)el.style.width=Math.min(pct*100,100)+'%';
  }
  function setVal(id,v){var el=document.getElementById(id);if(el)el.textContent=v;}

  setVal("macro-p-val",totalP+'g');
  setVal("macro-c-val",totalC+'g');
  setVal("macro-f-val",totalF+'g');
  setVal("macro-p-goal","/ "+(pGoal?pGoal+'g':'—'));
  setVal("macro-c-goal","/ "+(cGoal?cGoal+'g':'—'));
  setVal("macro-f-goal","/ "+(fGoal?fGoal+'g':'—'));
  setPct("macro-p-bar",pGoal?totalP/pGoal:0);
  setPct("macro-c-bar",cGoal?totalC/cGoal:0);
  setPct("macro-f-bar",fGoal?totalF/fGoal:0);

  // Food list
  if(!entries.length){
    document.getElementById("food-list").innerHTML='<div class="empty-state" style="padding:24px">Nothing logged yet</div>';
    return;
  }
  var html='';
  // Group by meal
  var grouped={};
  MEAL_TYPES.forEach(function(m){grouped[m]=[];});
  entries.forEach(function(e){if(grouped[e.meal])grouped[e.meal].push(e);});

  MEAL_TYPES.forEach(function(m){
    if(!grouped[m].length)return;
    var mealCal=grouped[m].reduce(function(s,e){return s+(e.cal||0);},0);
    html+='<div style="padding:8px 12px 2px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:'+(MEAL_COLORS[m]||"#888")+';">'+m+' · '+mealCal+' kcal</div>';
    grouped[m].forEach(function(e){
      var macroStr='';
      if(e.p||e.c||e.f){
        macroStr=(e.p?'P:'+e.p+'g ':'')+(e.c?'C:'+e.c+'g ':'')+(e.f?'F:'+e.f+'g':'');
      }
      html+='<div class="food-row">'
        +'<div class="food-meal-dot" style="background:'+(MEAL_COLORS[m]||"#888")+'"></div>'
        +'<div class="food-row-body"><div class="food-row-name">'+esc(e.name)+'</div>'
        +(macroStr?'<div class="food-row-macros">'+macroStr+'</div>':'')
        +'</div>'
        +'<div class="food-row-cal">'+e.cal+'</div>'
        +'<button class="food-del" data-fid="'+e.id+'">×</button>'
        +'</div>';
    });
  });
  document.getElementById("food-list").innerHTML='<div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:0 12px">'+html+'</div>';
  document.querySelectorAll(".food-del").forEach(function(btn){
    btn.addEventListener("click",function(){
      var id=Number(btn.dataset.fid);
      var arr=getCalData().filter(function(e){return e.id!==id;});
      saveCalData(arr);renderCalorieUI();toast("Removed");
    });
  });
}

document.getElementById("food-add-btn").addEventListener("click",addFood);
document.getElementById("food-name-input").addEventListener("keydown",function(e){if(e.key==="Enter")addFood();});

function addFood(){
  var name=document.getElementById("food-name-input").value.trim();

  toast("Logged ✓");
}

// ===================== SPECIFICS =====================
var SPEC_CATS = [
  {id:"fitness",  label:"Fitness",  icon:"💪", color:"var(--blue)"},
  {id:"learning", label:"Learning", icon:"📖", color:"var(--purple)"},
  {id:"finances", label:"Finances", icon:"💰", color:"var(--gold)"},
  {id:"growth",   label:"Growth",   icon:"🌱", color:"var(--teal)"}
];

var activeSpecCat = "fitness";
// drill-in state: null = list view, string id = concept detail view
var specDrillId = null;
// sub-tab for fitness/learning/growth
var specSubTab = null; // workout-type id, or "all"

// ---- Storage helpers ----
function getConcepts(cat){ return G("concepts_"+cat)||[]; }
function saveConcepts(cat,arr){ S("concepts_"+cat,arr); }
function getLogs(cat,cid){ return G("clog_"+cat+"_"+cid)||[]; }
function saveLogs(cat,cid,arr){ S("clog_"+cat+"_"+cid,arr); }

// ---- Workout type seeds ----
var FITNESS_DEFAULT_TYPES = ["Weight Lifting","Cardio","Conditioning","Plyo","Skill Build","Swim","Sprinting"];

function ensureFitnessTypes(){
  var arr=getConcepts("fitness");
  if(!arr.length){
    FITNESS_DEFAULT_TYPES.forEach(function(n,i){
      arr.push({id:1000+i, name:n, style:"workout", created:today(), icon:"🏋"});
    });
    saveConcepts("fitness",arr);
  }
  return arr;
}

// ---- Render dispatcher ----
function renderSpecifics(){
  // Top category tab bar
  var tabHtml='<div style="display:flex;gap:6px;padding:10px 12px 8px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)">';
  SPEC_CATS.forEach(function(c){
    var on=c.id===activeSpecCat;
    tabHtml+='<button class="spec-cat-btn" data-cat="'+c.id+'" style="flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid '+(on?c.color:"var(--border)")+';background:'+(on?"var(--bg4)":"var(--bg3)")+';color:'+(on?c.color:"var(--text3)")+';font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.5px">'+c.icon+' '+c.label+'</button>';
  });
  tabHtml+='</div>';
  document.getElementById("spec-tabs-row").innerHTML=tabHtml;
  document.querySelectorAll(".spec-cat-btn").forEach(function(btn){
    btn.addEventListener("click",function(){
      activeSpecCat=btn.dataset.cat;
      specDrillId=null;
      specSubTab=null;
      renderSpecifics();
    });
  });

  if(specDrillId !== null){
    renderConceptDetail();
  } else {
    if(activeSpecCat==="fitness") renderFitnessConcepts();
    else if(activeSpecCat==="learning") renderLearningConcepts();
    else if(activeSpecCat==="finances") renderFinancesConcepts();
    else if(activeSpecCat==="growth") renderGrowthConcepts();
  }
}

// ============ FITNESS CONCEPTS ============
function renderFitnessConcepts(){
  var cat=SPEC_CATS[0];
  var concepts=ensureFitnessTypes();
  if(!specSubTab) specSubTab="all";

  // Sub-tab bar for workout types
  var html='<div style="display:flex;gap:5px;padding:8px 12px 6px;overflow-x:auto;scrollbar-width:none">';
  html+='<button class="spec-sub-btn" data-sub="all" style="flex-shrink:0;padding:5px 12px;border-radius:16px;border:1px solid '+(specSubTab==="all"?cat.color:"var(--border)")+';background:'+(specSubTab==="all"?"var(--bg4)":"var(--bg3)")+';color:'+(specSubTab==="all"?cat.color:"var(--text3)")+';font-size:10px;font-weight:700;cursor:pointer">ALL</button>';
  concepts.forEach(function(c){
    var on=specSubTab===String(c.id);
    html+='<button class="spec-sub-btn" data-sub="'+c.id+'" style="flex-shrink:0;padding:5px 12px;border-radius:16px;border:1px solid '+(on?cat.color:"var(--border)")+';background:'+(on?"var(--bg4)":"var(--bg3)")+';color:'+(on?cat.color:"var(--text3)")+';font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap">'+esc(c.name)+'</button>';
  });
  html+='</div>';

  // New workout type input
  html+='<div style="display:flex;gap:8px;margin:0 12px 10px">'
    +mkInput("New workout type…","fit-new-type")
    +mkPrimaryBtn("ADD","fit-add-type",cat.color)
    +'</div>';

  // Concept cards
  var shown=specSubTab==="all"?concepts:concepts.filter(function(c){return String(c.id)===specSubTab;});
  if(!shown.length){
    html+='<div class="empty-state">No workouts yet</div>';
  } else {
    html+='<div style="margin:0 12px">';
    shown.forEach(function(c){
      var logs=getLogs("fitness",c.id);
      var last=logs.length?logs[logs.length-1]:null;
      var lastVal=last?(last.weight?last.weight+'kg × '+last.reps+'r':'—'):'—';
      var trend='';
      if(logs.length>=2){
        var prev=logs[logs.length-2];
        var curW=parseFloat(last.weight||0),prvW=parseFloat(prev.weight||0);
        if(curW>prvW) trend='<span style="color:var(--green);font-size:10px">▲ PR</span>';
        else if(curW<prvW) trend='<span style="color:var(--red);font-size:10px">▼</span>';
        else trend='<span style="color:var(--text3);font-size:10px">→</span>';
      }
      html+='<div class="spec-concept-row" data-cid="'+c.id+'" style="display:flex;align-items:center;gap:12px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:6px;cursor:pointer">'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:15px;font-weight:600;color:var(--text)">'+esc(c.name)+'</div>'
        +'<div style="font-size:11px;color:var(--text3);font-family:\'DM Mono\',monospace;margin-top:3px">'+logs.length+' sessions · Last: '+lastVal+' '+trend+'</div>'
        +'</div>'
        +'<span style="font-size:20px;color:var(--text3)">›</span>'
        +'</div>';
    });
    html+='</div>';
  }

  document.getElementById("spec-content").innerHTML=html;

  // Sub tab clicks
  document.querySelectorAll(".spec-sub-btn").forEach(function(btn){
    btn.addEventListener("click",function(){specSubTab=btn.dataset.sub;renderFitnessConcepts();});
  });
  // Add type
  var addBtn=sI("fit-add-type");
  if(addBtn) addBtn.addEventListener("click",function(){
    var inp=sI("fit-new-type");
    var name=inp?inp.value.trim():"";
    if(!name){toast("Enter a name");return;}
    var arr=getConcepts("fitness");
    arr.push({id:Date.now(),name:name,style:"workout",created:today(),icon:"🏋"});
    saveConcepts("fitness",arr);
    if(inp)inp.value="";
    renderFitnessConcepts();toast("Added ✓");
  });
  // Drill in
  document.querySelectorAll(".spec-concept-row").forEach(function(row){
    row.addEventListener("click",function(){specDrillId=row.dataset.cid;renderSpecifics();});
  });
}

    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">'

    +'</div>';

  if(!logs.length){

    html+='<div class="sec-lbl">History</div>'
      +'<div style="margin:0 12px">';

        var prev=allLogs[idx-1];
        var cw=parseFloat(l.weight||0),pw=parseFloat(prev.weight||0);
        if(cw>pw) trend=' <span style="color:var(--green)">▲</span>';
        else if(cw<pw) trend=' <span style="color:var(--red)">▼</span>';

        +'<button class="fd-del-btn" data-lid="'+l.id+'" style="position:absolute;top:9px;right:10px;background:none;border:none;color:var(--border2);font-size:15px;cursor:pointer">×</button>'
        +'</div>';
    });
    html+='</div>';
  }

  document.getElementById("spec-content").innerHTML=html;

  sI("spec-back-btn").addEventListener("click",function(){specDrillId=null;renderSpecifics();});

    var sets=sI("fd-sets").value.trim();
    var reps=sI("fd-reps").value.trim();
    var weight=sI("fd-weight").value.trim();
    var note=sI("fd-note").value.trim();
    if(!sets&&!reps&&!weight&&!note){toast("Enter at least one field");return;}
    var arr=getLogs("fitness",concept.id);
    arr.push({id:Date.now(),dt:today(),sets:sets,reps:reps,weight:weight,note:note});
    saveLogs("fitness",concept.id,arr);
    sI("fd-sets").value="";sI("fd-reps").value="";sI("fd-weight").value="";sI("fd-note").value="";
    renderConceptDetail();toast("Logged ✓");
  });
  document.querySelectorAll(".fd-del-btn").forEach(function(btn){
    btn.addEventListener("click",function(){
      var arr=getLogs("fitness",concept.id).filter(function(l){return l.id!==Number(btn.dataset.lid);});
      saveLogs("fitness",concept.id,arr);
      renderConceptDetail();toast("Removed");
    });

}

  html+='<div style="margin:0 12px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 14px">'
    +'<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:8px">NEW PROFILE</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:6px">'

    +mkPrimaryBtn("CREATE","ln-add-btn",cat.color)

  var shown=specSubTab==="all"?concepts:concepts.filter(function(c){return c.type===specSubTab;});
  if(!shown.length){
    html+='<div class="empty-state">No profiles yet</div>';
  } else {
    html+='<div style="margin:0 12px">';
    shown.forEach(function(c){
      var logs=getLogs("learning",c.id);
      var pct=c.totalPages?Math.min(Math.round((c.pagesRead||0)/c.totalPages*100),100):0;
      var statusDot=c.completed?'<span style="color:var(--green);font-size:10px">✓ Done</span>':(c.pagesRead?'<span style="color:var(--orange);font-size:10px">In Progress</span>':'<span style="color:var(--text3);font-size:10px">Not Started</span>');

        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
        +'<div><div style="font-size:15px;font-weight:600;color:var(--text)">'+esc(c.name)+'</div>'
        +'<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px">'+c.type+(c.author?' · '+esc(c.author):'')+'</div></div>'

        +(c.totalPages?progressBar(pct,cat.color)+'<div style="font-size:10px;color:var(--text3);margin-top:3px">'+( c.pagesRead||0)+' / '+c.totalPages+' pages · '+pct+'%</div>':'')
        +'</div>';

  document.querySelectorAll(".fin-del-btn").forEach(function(btn){
    btn.addEventListener("click",function(){
      var id=Number(btn.dataset.id);
      var arr=(G("spec_finances")||[]).filter(function(l){return l.id!==id;});
      S("spec_finances",arr);renderFinancesConcepts();toast("Removed");
    });
  });
}

// ============ GROWTH CONCEPTS ============
function renderGrowthConcepts(){
  var cat=SPEC_CATS[3];
  var concepts=getConcepts("growth");

  var html='<div style="margin:8px 12px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 14px">'
    +'<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:8px">NEW TRAIT / CONCEPT</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:6px">'
    +mkInput("e.g. Ambition, Patience, Discipline…","gr-new-name")
    +'</div>'
    +'<div style="display:flex;gap:8px">'
    +'<select id="gr-new-type" style="flex:1;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:13px;padding:9px 12px;outline:none"><option value="trait">Trait</option><option value="habit">Habit</option><option value="mindset">Mindset</option><option value="skill">Skill</option><option value="value">Value</option></select>'
    +mkPrimaryBtn("CREATE","gr-add-btn",cat.color)
    +'</div></div>';

  if(!concepts.length){
    html+='<div class="empty-state">No growth concepts yet</div>';
  } else {
    html+='<div style="margin:0 12px">';
    concepts.forEach(function(c){
      var logs=getLogs("growth",c.id);
      var cur=c.currentLevel||0;
      html+='<div class="spec-concept-row" data-cid="'+c.id+'" style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:6px;cursor:pointer">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
        +'<div><div style="font-size:15px;font-weight:600;color:var(--text)">'+esc(c.name)+'</div>'
        +'<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px">'+c.type+'</div></div>'
        +'<div style="text-align:right"><div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:'+cat.color+'">'+cur+'<span style="font-size:12px">/10</span></div>'
        +'<div style="font-size:10px;color:var(--text3)">'+logs.length+' entries</div></div>'
        +'</div>'
        +progressBar(cur*10,cat.color)
        +'</div>';
    });
    html+='</div>';
  }

  document.getElementById("spec-content").innerHTML=html;

  var addBtn=sI("gr-add-btn");
  if(addBtn) addBtn.addEventListener("click",function(){
    var name=sI("gr-new-name").value.trim();
    var type=sI("gr-new-type").value;
    if(!name){toast("Enter a name");return;}
    var arr=getConcepts("growth");
    arr.push({id:Date.now(),name:name,type:type,created:today(),currentLevel:0,peakLevel:0});
    saveConcepts("growth",arr);
    sI("gr-new-name").value="";
    renderGrowthConcepts();toast("Created ✓");
  });
  document.querySelectorAll(".spec-concept-row").forEach(function(row){
    row.addEventListener("click",function(){specDrillId=row.dataset.cid;renderSpecifics();});
  });
}

function renderGrowthDetail(cat){
  var concepts=getConcepts("growth");
  var concept=concepts.find(function(c){return String(c.id)===String(specDrillId);});
  if(!concept){specDrillId=null;renderSpecifics();return;}
  var logs=getLogs("growth",concept.id).slice().reverse();
  var cur=concept.currentLevel||0;
  var peak=concept.peakLevel||cur;

  var html=backBtn("Growth");

  // Header
  html+='<div style="margin:4px 12px 8px;background:var(--bg3);border:1px solid '+cat.color+';border-radius:14px;padding:14px 16px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
    +'<div><div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:'+cat.color+';letter-spacing:1px">'+esc(concept.name)+'</div>'
    +'<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px">'+concept.type+'</div></div>'
    +'<div style="text-align:right">'
    +'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:32px;color:'+cat.color+'">'+cur+'<span style="font-size:14px">/10</span></div>'
    +'<div style="font-size:10px;color:var(--text3)">Peak: '+peak+'/10</div>'
    +'</div></div>'
    +progressBar(cur*10,cat.color)
    +'</div>';

  // Level slider
  html+='<div style="margin:0 12px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 14px">'
    +'<div style="font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:10px">SET CURRENT LEVEL</div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">';
  for(var lvl=0;lvl<=10;lvl++){
    var isOn=lvl===cur;
    html+='<button class="gr-level-btn" data-lvl="'+lvl+'" style="width:36px;height:36px;border-radius:8px;border:1px solid '+(isOn?cat.color:"var(--border2)")+';background:'+(isOn?cat.color:"var(--bg4)")+';color:'+(isOn?"#000":"var(--text3)")+';font-size:13px;font-weight:700;cursor:pointer">'+lvl+'</button>';
  }
  html+='</div>'
    +'<textarea id="gr-note" placeholder="Reflection, evidence, milestone…" style="width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:\'DM Sans\',sans-serif;font-size:13px;padding:10px 12px;outline:none;resize:none;height:66px;display:block;margin-bottom:8px"></textarea>'
    +'<select id="gr-entry-type" style="width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:13px;padding:9px 12px;outline:none;margin-bottom:8px"><option>Reflection</option><option>Evidence</option><option>Milestone</option><option>Setback</option><option>Goal</option><option>Gratitude</option></select>'
    +'<button id="gr-log-btn" style="width:100%;background:'+cat.color+';border:none;border-radius:10px;color:#000;font-family:\'Bebas Neue\',sans-serif;font-size:15px;letter-spacing:1px;padding:11px;cursor:pointer">LOG ENTRY</button>'
    +'</div>';

  // History
  if(logs.length){
    html+='<div class="sec-lbl">Journal</div><div style="margin:0 12px">';
    logs.forEach(function(l){
      var trend='';
      if(l.levelBefore!==undefined&&l.levelAfter!==undefined){
        if(l.levelAfter>l.levelBefore) trend='<span style="color:var(--green)"> ▲ '+l.levelAfter+'</span>';
        else if(l.levelAfter<l.levelBefore) trend='<span style="color:var(--red)"> ▼ '+l.levelAfter+'</span>';
        else trend='<span style="color:var(--text3)"> → '+l.levelAfter+'</span>';
      }
      html+='<div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:11px 14px;margin-bottom:6px;position:relative">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:4px">'
        +'<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:'+cat.color+'">'+esc(l.type||"Reflection")+trend+'</span>'
        +'<span style="font-size:10px;color:var(--text3);font-family:\'DM Mono\',monospace">'+fmtDate(l.dt)+'</span>'
        +'</div>'
        +'<div style="font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap">'+esc(l.note)+'</div>'
        +'<button class="gr-del-btn" data-lid="'+l.id+'" style="position:absolute;top:9px;right:10px;background:none;border:none;color:var(--border2);font-size:15px;cursor:pointer">×</button>'
        +'</div>';
    });
    html+='</div>';
  }

  document.getElementById("spec-content").innerHTML=html;

  sI("spec-back-btn").addEventListener("click",function(){specDrillId=null;renderSpecifics();});

  var selectedLevel=cur;
  document.querySelectorAll(".gr-level-btn").forEach(function(btn){
    btn.addEventListener("click",function(){
      selectedLevel=parseInt(btn.dataset.lvl);
      document.querySelectorAll(".gr-level-btn").forEach(function(b){
        var on=parseInt(b.dataset.lvl)===selectedLevel;
        b.style.borderColor=on?cat.color:"var(--border2)";
        b.style.background=on?cat.color:"var(--bg4)";
        b.style.color=on?"#000":"var(--text3)";
      });
    });
  });

  sI("gr-log-btn").addEventListener("click",function(){
    var note=sI("gr-note").value.trim();
    var type=sI("gr-entry-type").value;
    if(!note&&selectedLevel===cur){toast("Write a reflection or change the level");return;}
    var prevLevel=cur;
    var concepts2=getConcepts("growth");
    var idx=concepts2.findIndex(function(c){return String(c.id)===String(specDrillId);});
    if(idx>=0){
      concepts2[idx].currentLevel=selectedLevel;
      if(selectedLevel>(concepts2[idx].peakLevel||0)) concepts2[idx].peakLevel=selectedLevel;
      saveConcepts("growth",concepts2);
    }
    if(note||selectedLevel!==prevLevel){
      var arr=getLogs("growth",concept.id);
      arr.push({id:Date.now(),dt:today(),type:type,note:note||("Level set to "+selectedLevel),levelBefore:prevLevel,levelAfter:selectedLevel});
      saveLogs("growth",concept.id,arr);
    }
    sI("gr-note").value="";
    renderGrowthDetail(cat);toast("Logged ✓");
  });

  document.querySelectorAll(".gr-del-btn").forEach(function(btn){
    btn.addEventListener("click",function(){
      var arr=getLogs("growth",concept.id).filter(function(l){return l.id!==Number(btn.dataset.lid);});
      saveLogs("growth",concept.id,arr);
      renderGrowthDetail(cat);toast("Removed");
    });
  });
}

// ===================== BOOT =====================
updateHeader();
renderMandala();
renderChecklist();
</script>
</body>
